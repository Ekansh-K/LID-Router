# ============================================================
# Language Code Mapping — Normalized ISO 639-3 as canonical key
# ============================================================
# Each entry maps a canonical ISO 639-3 code to:
#   - whisper: code used by openai-whisper (ISO 639-1 / custom)
#   - mms_lid: code used by facebook/mms-lid-4017
#   - mms_asr: code used by facebook/mms-1b-all
#   - fleurs:  config name in google/fleurs dataset
#   - name:    human-readable name
#   - family:  language family (for grouping & analysis)
#
# NOTE: Some codes need verification against actual model configs.
# Run `python -m src.utils verify-lang-map` to validate at runtime.

# ─── Group A: High-Resource, Well-Separated (8 langs) ───
